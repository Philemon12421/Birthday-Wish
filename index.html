<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Happy Birthday!</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="balloon-container"></div>
    
    <div id="hat-container"></div>

    <div class="container">
        <h1>Celebrating a Life Well Lived!</h1>
        <p class="message">Wishing you a wonderful birthday filled with joy and reflection.</p>

        <div id="celebration-icon" class="icon">🎁</div> 

        <p class="click-prompt">Click the gift for a warm message!</p>

        <div class="gifts-section">
            <h2>Your Presents Await!</h2>
            <div class="gift-box-wrapper">
                <div class="gift-box" id="gift1">
                    <div class="lid"></div>
                    <div class="present-content">🎁</div> 
                    <p class="gift-label">Click to open!</p>
                </div>
                <div class="gift-box" id="gift2">
                    <div class="lid"></div>
                    <div class="present-content">🎉</div>
                    <p class="gift-label">Click to open!</p>
                </div>
                <div class="gift-box" id="gift3">
                    <div class="lid"></div>
                    <div class="present-content">💌</div> 
                    <p class="gift-label">Click to open!</p>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script> 
</body>
</html>
